<!DOCTYPE html>
<html>
<head>
    <title>Student Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ICT Student Cohort3 Database Management</h1>

<form id="studentForm">
    <input type="text" id="name" placeholder="Student Name" required>
    <input type="number" id="age" placeholder="Age" required>
    <input type="text" id="class" placeholder="Class" required>
    <input type="text" id="gender" placeholder="Gender" required>
    <input type="text" id="email" placeholder="Email" required>
    <input type="number" id="payment" placeholder="Payment" required>
    <input type="text" id="month" placeholder="Month" required>
    <input type="text" id="citizenship" placeholder="Citizenship" required>
    <input type="text" id="morning" placeholder="Morning" required>

 

    <button type="submit">Add Student</button>
</form>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Class</th>
            <th>Email</th>
            <th>Payment</th>
            <th>Month</th>
            <th>Citizenship</th>
            <th>Morning</th>

            <th>Action</th>
        </tr>
    </thead>
    <tbody id="studentTable"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
